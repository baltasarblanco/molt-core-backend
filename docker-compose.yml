version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: molt_db
    restart: always
    environment:
      POSTGRES_USER: molt_admin
      POSTGRES_PASSWORD: molt_secure_password
      POSTGRES_DB: molt_core
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molt_admin -d molt_core"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: molt_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

