<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môlt Live-Ops | Dashboard Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; }
        
        .order-card { 
            animation: popAndPulse 2.5s cubic-bezier(0.26, 0.53, 0.74, 1.48); 
        }

        @keyframes popAndPulse {
            0% { opacity: 0; transform: scale(0.9); box-shadow: 0 0 0px 0px rgba(245, 158, 11, 0); }
            20% { opacity: 1; transform: scale(1.02); box-shadow: 0 0 50px 15px rgba(245, 158, 11, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 0px 0px rgba(245, 158, 11, 0); }
        }

        .completed-card {
            filter: grayscale(1) opacity(0.3);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        /* Ocultar scrollbar pero permitir scroll */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-zinc-100 min-h-screen p-6 overflow-hidden flex flex-col">
    
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <header class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
        <div class="flex items-center gap-4">
            <div class="bg-amber-500 p-2.5 rounded-2xl shadow-lg shadow-amber-500/20">
                <i data-lucide="flame" class="text-black w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase">MÔLT <span class="text-zinc-600 font-light lowercase tracking-normal">live-ops</span></h1>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Dashboard de Cocina v2.6</p>
            </div>
        </div>
        
        <div id="status" class="flex items-center gap-3 px-6 py-3 bg-zinc-900/80 rounded-2xl border border-zinc-800 backdrop-blur-xl">
            <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.5)]"></div>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">Offline</span>
        </div>
    </header>

    <main class="flex-1 flex gap-8 overflow-hidden">
        <section id="orders-container" class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto pr-4 scrollbar-hide">
            </section>

        <aside class="w-80 bg-zinc-900/30 rounded-3xl border border-zinc-800/50 p-6 flex flex-col">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-600 mb-6 flex items-center gap-2">
                <i data-lucide="history" class="w-4 h-4"></i> Despachados
            </h3>
            <div id="history-container" class="space-y-3 overflow-y-auto flex-1 text-sm scrollbar-hide">
                </div>
        </aside>
    </main>

    <script>
    const container = document.getElementById('orders-container');
    const history = document.getElementById('history-container');
    const statusDiv = document.getElementById('status');
    const notifSound = document.getElementById('notif-sound');
    let socket = null;

    // --- 🛡️ BLINDAJE: RECUPERACIÓN DE ESTADO ---
    async function loadActiveOrders() {
        try {
            const response = await fetch('http://localhost:8000/api/v1/orders/active');
            if (!response.ok) throw new Error('Error al obtener órdenes');
            
            const orders = await response.json();
            
            // Limpiamos el tablero antes de cargar para evitar duplicados en reconexiones
            container.innerHTML = ''; 
            
            // Renderizamos las órdenes de la DB (de más vieja a más nueva para que el prepend las ordene bien)
            orders.reverse().forEach(order => {
                renderOrder(order);
            });
            console.log(`✅ Estado recuperado: ${orders.length} órdenes activas.`);
        } catch (error) {
            console.error("❌ Falló el blindaje de recuperación:", error);
        }
    }

    // --- 🛡️ BLINDAJE: CONEXIÓN INMORTAL ---
    function connect() {
        socket = new WebSocket('ws://localhost:8000/ws/live-ops');

        socket.onopen = () => {
            console.log("🚀 Conectado al servidor de órdenes");
            statusDiv.innerHTML = `
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_15px_rgba(34,197,94,0.5)]"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-green-500">Cocina Conectada</span>
            `;
            lucide.createIcons();
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.event === "NEW_ORDER") {
                // Notificación visual y sonora
                notifSound.play().catch(e => console.log("Esperando interacción para audio..."));
                renderOrder(data);
            }
        };

        socket.onclose = () => {
            console.log("⚠️ Conexión perdida. Reintentando en 3 segundos...");
            statusDiv.innerHTML = `
                <div class="w-2.5 h-2.5 bg-amber-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-500">Reconectando...</span>
            `;
            // Intento de reconexión automática
            setTimeout(connect, 3000);
        };

        socket.onerror = (err) => {
            console.error("Socket error: ", err);
            socket.close();
        };
    }

    // --- LÓGICA DE RENDERIZADO ---
    function renderOrder(order) {
    if (document.getElementById(`order-${order.order_id}`)) return;

    const card = document.createElement('div');
    card.id = `order-${order.order_id}`;
    card.className = 'order-card bg-zinc-900 border-l-4 border-amber-500 rounded-3xl p-6 flex flex-col justify-between shadow-2xl relative group overflow-hidden';
    
    const itemsHtml = order.items.map(item => {
        // Lógica de íconos dinámica basada en el nombre real
        const name = item.name.toLowerCase();
        let icon = 'utensils-crosses'; // Default: Comida
        if (name.includes('ipa') || name.includes('birra') || name.includes('pinta')) icon = 'beer';
        if (name.includes('fernet') || name.includes('coca')) icon = 'glass-water';

        return `
        <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/5">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-zinc-800 rounded-xl text-amber-500">
                    <i data-lucide="${icon}" class="w-5 h-5"></i>
                </div>
                <span class="font-bold text-lg">${item.name}</span> </div>
            <span class="text-3xl font-black text-amber-500">x${item.qty}</span>
        </div>`;
    }).join('');

    // ... (el resto de la función card.innerHTML se mantiene igual)
    card.innerHTML = `
        <div>
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span class="text-[10px] font-black text-zinc-600 uppercase tracking-widest">ID #${order.order_id.substring(0,6)}</span>
                    <h2 class="text-3xl font-black text-white leading-none mt-1">${order.customer}</h2>
                </div>
                <div class="flex items-center gap-2 text-amber-500 font-mono text-xs bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">
                    <i data-lucide="clock" class="w-3 h-3"></i> <span class="timer">00:00</span>
                </div>
            </div>
            <div class="space-y-3">${itemsHtml}</div>
        </div>
        <div class="mt-8 pt-6 border-t border-zinc-800/50">
            <div class="flex justify-between items-center mb-6 px-1">
                <span class="text-zinc-500 font-bold text-[10px] uppercase tracking-widest italic">Total Orden</span>
                <span class="text-2xl font-black text-white font-mono">$${order.total}</span>
            </div>
            <button onclick="dispatchOrder('${order.order_id}', '${order.customer}')" class="w-full bg-zinc-100 hover:bg-white text-black font-black py-5 rounded-2xl transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                <i data-lucide="check-circle" class="w-6 h-6"></i> DESPACHAR
            </button>
        </div>
    `;
    
    container.prepend(card);
    lucide.createIcons();
    startTimer(card.querySelector('.timer'));
}

// --- ⏲️ GESTIÓN DE TIEMPO ---
    function startTimer(element) {
        let sec = 0;
        const interval = setInterval(() => {
            if (!element.isConnected) { clearInterval(interval); return; }
            sec++;
            let m = Math.floor(sec/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            element.innerText = `${m}:${s}`;
            
            // Si pasan 10 mins (600s), se pone rojo (orden demorada)
            if (sec > 600) {
                element.parentElement.classList.replace('text-amber-500', 'text-red-500');
                element.parentElement.classList.add('animate-pulse'); // Plus de urgencia
            }
        }, 1000);
    }

    // --- 🚀 LÓGICA DE DESPACHO (ÚNICA Y ASYNC) ---
    async function dispatchOrder(id, name) {
        try {
            console.log(`Intentando despachar orden: ${id}`);

            // 1. Avisamos al Backend (Cambiar 'DELIVERED' por tu Enum exacto)
            const response = await fetch(`http://127.0.0.1:8000/api/v1/orders/${id}/status`, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ status: 'DELIVERED' }) 
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || "Error en el servidor");
            }

            // 2. Si el server dio OK, animamos y borramos de pantalla
            const card = document.getElementById(`order-${id}`);
            if (card) {
                card.classList.add('completed-card');
                
                // Agregamos al historial visual rápido
                const historyItem = document.createElement('div');
                historyItem.className = 'flex items-center justify-between p-4 bg-zinc-900/50 rounded-2xl border border-zinc-800/50 text-zinc-500 text-xs font-bold mb-2 transition-all opacity-0';
                historyItem.innerHTML = `<span>${name}</span> <span class="text-green-500 uppercase tracking-widest text-[8px]">OK</span>`;
                history.prepend(historyItem);
                setTimeout(() => historyItem.classList.replace('opacity-0', 'opacity-100'), 100);

                // Removemos la tarjeta después de la animación
                setTimeout(() => card.remove(), 600);
            }

            console.log(`✅ Orden ${id} despachada correctamente.`);

        } catch (error) {
            console.error("❌ Falló el despacho:", error);
            alert("No se pudo conectar con el servidor: " + error.message);
        }
    }

    // --- 🏁 INICIO DEL SISTEMA ---
    window.addEventListener('DOMContentLoaded', () => {
        loadActiveOrders(); // 1. Trae lo que está en la DB (Persistencia)
        connect();          // 2. Escucha lo nuevo en tiempo real (WebSockets)
    });
</script>
